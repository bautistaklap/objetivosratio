name: Generar reporte semanal

on:
  schedule:
    - cron: '0 11 * * 1'
  workflow_dispatch:

jobs:
  generar:
    runs-on: ubuntu-latest
    steps:
      - name: Generar análisis con Gemini y guardar en JSONBin
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          JSONBIN_KEY: ${{ secrets.JSONBIN_KEY }}
          REPORTES_BIN: ${{ secrets.REPORTES_BIN }}
          TRACKER_BIN: 69dfa22a856a68218938e40e
        run: |
          cat << 'PYEOF' > generar.py
          import json, urllib.request, urllib.parse, datetime, os

          GEMINI_KEY = os.environ['GEMINI_KEY']
          JSONBIN_KEY = os.environ['JSONBIN_KEY']
          REPORTES_BIN = os.environ['REPORTES_BIN']
          TRACKER_BIN = os.environ['TRACKER_BIN']

          EQUIPO_DATA = {
            'Agustín':   {'equipo':'Guión','rol':'Guionista','horario':'9-17hs','esperado':'20-25 guiones/semana + notas + placas','tareas':'4-5 guiones por día, una nota por guión, una placa prediseñada por guión'},
            'Juan':      {'equipo':'Guión','rol':'Guionista','horario':'9-17hs','esperado':'20-25 guiones/semana + notas + placas + twitter','tareas':'4-5 guiones por día, twitter, notas propias + las de Alfredo, placas propias + las de Alfredo'},
            'Alfredo':   {'equipo':'Guión','rol':'Guionista/Técnico/Locutor','horario':'9-15.30/16hs','esperado':'19 guiones/semana + técnica + grabaciones','tareas':'Asegura funcionamiento estudios, 3 guiones antes del almuerzo, ~19 guiones/semana, grabaciones'},
            'Clara':     {'equipo':'Digital','rol':'CM','horario':'14-17/18hs (part-time)','esperado':'Copies diarios + 4 placas/semana + informes + programación redes','tareas':'Copy por video, programar videos en redes, placas (4/semana), informes jueves y viernes, Abzurdo de la semana, tema marca'},
            'Malena':    {'equipo':'Digital','rol':'Diseñadora','horario':'14-17/18hs o 9.15-13hs (part-time)','esperado':'Portadas + 4 placas/semana + newsletter + 5 noticias + informes','tareas':'Portadas, calendarizar videos, placas, newsletter, 5 noticias, informes jueves y viernes, tema marca'},
            'Sofía':     {'equipo':'Digital','rol':'Líder','horario':'10-17hs','esperado':'Liderazgo activo: temas + decisiones editoriales + correcciones + marca','tareas':'Búsqueda de temas, reorganización del día, decisiones de contenido, correcciones, marca, calendarización, supervisar informes'},
            'Candela':   {'equipo':'Producción','rol':'Productora','horario':'9.30-10.15 / 17-18.20hs','esperado':'32 videos producidos/semana + coordinación CP + recursos','tareas':'Organiza videos, coordina CP, pasa crudos, busca recursos para editores, coyunturas, 32 videos/semana'},
            'Luciana':   {'equipo':'Producción','rol':'Productora','horario':'9/9.30-17hs','esperado':'32 videos producidos/semana + coordinación CP + recursos','tareas':'Organiza videos, coordina CP, pasa crudos, búsqueda de recursos, coyunturas, 32 videos/semana'},
            'Manuel':    {'equipo':'Paid Media','rol':'Paid Media','horario':'9/9.20-17hs','esperado':'100-150 pautas/semana en Meta/Google/TikTok/YT + informes','tareas':'Chequeo pauta, armar pautado, planificar presupuesto, pautar 100-150/semana, informes, diagrama prioridades jueves'},
            'Victoria':  {'equipo':'Paid Media','rol':'Paid Media','horario':'8-9 / 15-17hs (jornada completa flexible)','esperado':'100-150 pautas/semana en Meta/Google/TikTok/YT + informes','tareas':'Chequeo pauta, armar pautado, planificar presupuesto, pautar 100-150/semana, informes'},
          }

          def get_week_key(date):
              day = date.weekday()
              days_to_friday = (day - 4) % 7
              friday = date - datetime.timedelta(days=days_to_friday)
              return friday.strftime('%Y-%m-%d')

          def week_label(key):
              d = datetime.datetime.strptime(key, '%Y-%m-%d')
              end = d + datetime.timedelta(days=6)
              return f"{d.strftime('%d/%m')}–{end.strftime('%d/%m')}"

          def jsonbin_get(bin_id):
              req = urllib.request.Request(
                  f'https://api.jsonbin.io/v3/b/{bin_id}/latest',
                  headers={'X-Master-Key': JSONBIN_KEY}
              )
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          def jsonbin_put(bin_id, data):
              body = json.dumps(data).encode()
              req = urllib.request.Request(
                  f'https://api.jsonbin.io/v3/b/{bin_id}',
                  data=body,
                  headers={'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY},
                  method='PUT'
              )
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          today = datetime.datetime.utcnow() - datetime.timedelta(hours=3)
          prev_week = get_week_key(today - datetime.timedelta(weeks=1))
          label = week_label(prev_week)
          print(f"Generando reporte para semana: {label} ({prev_week})")

          tracker = jsonbin_get(TRACKER_BIN)['record'].get('datos', {})
          reportes_data = jsonbin_get(REPORTES_BIN)['record'].get('reportes', {})

          if prev_week in reportes_data:
              print("Reporte ya existe para esta semana, saltando.")
              exit(0)

          personas = []
          for nombre, info in EQUIPO_DATA.items():
              semana = tracker.get(nombre, {}).get(prev_week)
              if not semana:
                  continue
              objs = semana.get('objetivos', [])
              confs = semana.get('confirmaciones', [])
              cumplidos = sum(1 for c in confs if c.get('cumplido'))
              no_cumplidos = sum(1 for c in confs if not c.get('cumplido'))
              justificaciones = [c.get('justificacion','') for c in confs if not c.get('cumplido') and c.get('justificacion')]
              personas.append({
                  'nombre': nombre,
                  'equipo': info['equipo'],
                  'rol': info['rol'],
                  'horario': info['horario'],
                  'esperado': info['esperado'],
                  'tareas': info['tareas'],
                  'objetivos': objs,
                  'cumplidos': cumplidos,
                  'no_cumplidos': no_cumplidos,
                  'sin_confirmar': len(objs) - len(confs),
                  'justificaciones': justificaciones,
                  'total_objetivos': len(objs)
              })

          if not personas:
              print("No hay datos para esta semana.")
              exit(0)

          prompt = f"""Sos un agente senior especializado en análisis de performance, productividad y rendimiento de equipos de trabajo. Tu análisis es directo, real, sin suavizar nada. Cuando algo está mal lo decís. Cuando algo está bien también.

CONTEXTO DEL EQUIPO - RATIO:
{json.dumps(EQUIPO_DATA, ensure_ascii=False, indent=2)}

DATOS DE LA SEMANA {label}:
{json.dumps(personas, ensure_ascii=False, indent=2)}

Generá un análisis completo en formato JSON con esta estructura exacta:
{{
  "semana": "{label}",
  "equipos": [
    {{
      "nombre": "nombre del equipo",
      "integrantes": [
        {{
          "nombre": "nombre",
          "cumplimiento": "análisis del nivel de cumplimiento de objetivos",
          "productividad": "análisis de productividad esperada vs lograda considerando su rol, horario y tareas base",
          "balance": "balance real de la semana, directo y sin filtros",
          "score": número del 0 al 10,
          "sugerencias": ["sugerencia 1", "sugerencia 2"],
          "calidad_objetivos": "evaluación de si los objetivos cargados son claros, medibles, exigentes y suficientes en cantidad"
        }}
      ],
      "mvp": {{
        "nombre": "nombre del MVP",
        "justificacion": "por qué es el MVP de la semana"
      }},
      "balance_area": "análisis del área como unidad, cómo estuvo la semana"
    }}
  ],
  "analisis_general": {{
    "analisis_cuali": "análisis cualitativo del equipo completo, directo y real",
    "balance": "positivo|negativo|neutro",
    "score_semana": número del 0 al 10,
    "sugerencias": ["sugerencia 1", "sugerencia 2", "sugerencia 3"]
  }},
  "alertas": [
    {{
      "titulo": "título de la alerta",
      "descripcion": "descripción de qué está pasando y por qué es urgente"
    }}
  ]
}}

Respondé SOLO con el JSON, sin texto adicional, sin markdown, sin backticks."""

          body = json.dumps({
              "contents": [{"parts": [{"text": prompt}]}],
              "generationConfig": {"temperature": 0.3, "maxOutputTokens": 8000}
          }).encode()

          req = urllib.request.Request(
              f'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key={GEMINI_KEY}',
              data=body,
              headers={'Content-Type': 'application/json'},
              method='POST'
          )
          with urllib.request.urlopen(req) as r:
              resp = json.loads(r.read())

          text = resp['candidates'][0]['content']['parts'][0]['text']
          text = text.replace('```json','').replace('```','').strip()
          analisis = json.loads(text)
          print("Análisis generado correctamente.")

          reportes_data[prev_week] = analisis
          jsonbin_put(REPORTES_BIN, {'reportes': reportes_data})
          print(f"Reporte guardado en JSONBin para la semana {prev_week}.")
          PYEOF

          python3 generar.py
