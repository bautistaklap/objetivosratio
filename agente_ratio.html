function getWeekKey(date){
  const d=new Date(date);d.setHours(0,0,0,0);
  const day=d.getDay();
  const fri=new Date(d);
  fri.setDate(d.getDate()-((day>=5)?(day-5):(day+2)));
  return fri.toISOString().slice(0,10);
}
function weekLabel(key){
  const d=new Date(key+'T12:00:00');
  const end=new Date(d);end.setDate(d.getDate()+6);
  const fmt=dt=>dt.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'});
  return fmt(d)+' – '+fmt(end);
}

function render(html){document.getElementById('view').innerHTML=html;}
function setTopbar(html){document.getElementById('topbar-right').innerHTML=html;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

async function fetchTracker(){
  const r=await fetch('https://api.jsonbin.io/v3/b/'+TRACKER_BIN+'/latest',{headers:{'X-Master-Key':JSONBIN_KEY}});
  const j=await r.json();return j.record?.datos||{};
}
async function fetchReportes(){
  try{
    const r=await fetch('https://api.jsonbin.io/v3/b/'+REPORTES_BIN+'/latest',{headers:{'X-Master-Key':JSONBIN_KEY}});
    const j=await r.json();return j.record?.reportes||{};
  }catch(e){return{};}
}
async function saveReporte(weekKey,reporte){
  const reportes=await fetchReportes();
  reportes[weekKey]=reporte;
  await fetch('https://api.jsonbin.io/v3/b/'+REPORTES_BIN,{
    method:'PUT',
    headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY},
    body:JSON.stringify({reportes})
  });
}

async function generarAnalisis(trackerData,weekKey){
  const usuarios=Object.keys(trackerData).filter(u=>u!=='__inactive');
  const datosPersonas=usuarios.map(u=>{
    const semana=trackerData[u]?.[weekKey];
    const info=EQUIPO_DATA[u];
    if(!semana||!info)return null;
    const objs=semana.objetivos||[];
    const confs=semana.confirmaciones||[];
    const cumplidos=confs.filter(c=>c.cumplido).length;
    const noCumplidos=confs.filter(c=>!c.cumplido).length;
    const sinConf=objs.length-confs.length;
    const justificaciones=confs.filter(c=>!c.cumplido&&c.justificacion).map(c=>c.justificacion);
    return{
      nombre:u,
      equipo:info.equipo,
      rol:info.rol,
      horario:info.horario,
      esperado:info.esperado,
      tareas:info.tareas,
      objetivos:objs,
      cumplidos,
      noCumplidos,
      sinConf,
      justificaciones,
      totalObjs:objs.length
    };
  }).filter(Boolean);

  if(!datosPersonas.length)return null;

  const prompt=`Sos un agente senior especializado en análisis de performance, productividad y rendimiento de equipos de trabajo. Tu análisis es directo, real, sin suavizar nada. Cuando algo está mal, lo decís. Cuando algo está bien, también.

CONTEXTO DEL EQUIPO - RATIO:
${JSON.stringify(EQUIPO_DATA,null,2)}

DATOS DE LA SEMANA ${weekLabel(weekKey)}:
${JSON.stringify(datosPersonas,null,2)}

Generá un análisis completo en formato JSON con esta estructura exacta:
{
  "semana": "${weekLabel(weekKey)}",
  "equipos": [
    {
      "nombre": "nombre del equipo",
      "integrantes": [
        {
          "nombre": "nombre",
          "cumplimiento": "análisis del nivel de cumplimiento de objetivos",
          "productividad": "análisis de productividad esperada vs lograda considerando su rol, horario y tareas base",
          "balance": "balance real de la semana, directo y sin filtros",
          "score": número del 0 al 10,
          "sugerencias": ["sugerencia 1", "sugerencia 2"],
          "calidad_objetivos": "evaluación de si los objetivos cargados son claros, medibles, exigentes y suficientes en cantidad"
        }
      ],
      "mvp": {
        "nombre": "nombre del MVP",
        "justificacion": "por qué es el MVP de la semana"
      },
      "balance_area": "análisis del área como unidad, cómo estuvo la semana"
    }
  ],
  "analisis_general": {
    "analisis_cuali": "análisis cualitativo del equipo completo, directo y real",
    "balance": "positivo|negativo|neutro",
    "score_semana": número del 0 al 10,
    "sugerencias": ["sugerencia 1", "sugerencia 2", "sugerencia 3"]
  },
  "alertas": [
    {
      "titulo": "título de la alerta",
      "descripcion": "descripción de qué está pasando y por qué es urgente"
    }
  ]
}

Respondé SOLO con el JSON, sin texto adicional, sin markdown, sin backticks.`;

  const resp=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key='+GEMINI_KEY,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.3,maxOutputTokens:8000}})
  });
  const data=await resp.json();
  const text=data.candidates?.[0]?.content?.parts?.[0]?.text||'';
  const clean=text.replace(/```json|```/g,'').trim();
  return JSON.parse(clean);
}

function scoreClass(s){
  if(s>=7)return'score-alto';
  if(s>=4)return'score-medio';
  return'score-bajo';
}
function scoreColor(s){
  if(s>=7)return'#9FE1CB';
  if(s>=4)return'#FAC775';
  return'#F09595';
}
function balanceBadge(b){
  if(!b)return'';
  const bl=b.toLowerCase();
  if(bl.includes('positivo'))return'<span class="badge-pos">Positivo</span>';
  if(bl.includes('negativo'))return'<span class="badge-neg">Negativo</span>';
  return'<span class="badge-neu">Neutro</span>';
}

function renderAnalisis(data,weekKey){
  if(!data){render('<div style="text-align:center;padding:3rem;color:#7a8fa6;font-size:14px">No hay datos disponibles para esta semana.</div>');return;}

  let html=`<div class="meta-info">Análisis generado para la semana del ${esc(data.semana||weekLabel(weekKey))}</div>`;

  data.equipos?.forEach(eq=>{
    html+=`<div class="equipo-block">
      <div class="equipo-title">
        <span style="width:8px;height:8px;border-radius:50%;background:#e8401c;display:inline-block"></span>
        ${esc(eq.nombre)}
      </div>`;

    eq.integrantes?.forEach(p=>{
      const sc=p.score||0;
      html+=`<div class="integrante-card">
        <div class="integrante-header">
          <span class="integrante-nombre">${esc(p.nombre)}</span>
          <span class="score ${scoreClass(sc)}">${sc}/10</span>
        </div>
        <div class="integrante-body">
          <div>
            <div class="row-label">Cumplimiento de objetivos</div>
            <div class="row-value">${esc(p.cumplimiento||'')}</div>
          </div>
          <div>
            <div class="row-label">Productividad</div>
            <div class="row-value">${esc(p.productividad||'')}</div>
            <div class="prod-bar"><div class="prod-bar-fill" style="width:${Math.min(sc*10,100)}%"></div></div>
          </div>
          <div>
            <div class="row-label">Balance de la semana</div>
            <div class="row-value">${esc(p.balance||'')}</div>
          </div>
          ${p.calidad_objetivos?`<div>
            <div class="row-label">Calidad de objetivos</div>
            <div class="row-value muted">${esc(p.calidad_objetivos)}</div>
          </div>`:''}
          ${p.sugerencias?.length?`<div>
            <div class="row-label">Sugerencias</div>
            ${p.sugerencias.map(s=>`<div class="sugerencia">${esc(s)}</div>`).join('')}
          </div>`:''}
        </div>
      </div>`;
    });

    if(eq.mvp){
      html+=`<div class="mvp-card">
        <div class="mvp-label">Integrante destacado de la semana</div>
        <div class="mvp-nombre">${esc(eq.mvp.nombre)}</div>
        <div class="mvp-razon">${esc(eq.mvp.justificacion||'')}</div>
      </div>`;
    }

    if(eq.balance_area){
      html+=`<div class="balance-area">
        <div class="balance-label">Balance del área</div>
        <div class="balance-text">${esc(eq.balance_area)}</div>
      </div>`;
    }

    html+=`</div><div class="divider"></div>`;
  });

  const ag=data.analisis_general;
  if(ag){
    html+=`<div class="section-title">Análisis general del equipo</div>
    <div class="card"><div class="ch ch-plain"><span class="ch-title">Análisis cualitativo</span></div>
    <div class="cb"><div class="row-value" style="line-height:1.7">${esc(ag.analisis_cuali||'')}</div></div></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.25rem">
      <div class="card"><div class="cb" style="text-align:center">
        <div class="row-label" style="text-align:center;margin-bottom:8px">Balance</div>
        ${balanceBadge(ag.balance)}
      </div></div>
      <div class="card"><div class="cb" style="text-align:center">
        <div class="row-label" style="text-align:center;margin-bottom:4px">Puntaje de la semana</div>
        <div class="score-general" style="color:${scoreColor(ag.score_semana||0)}">${ag.score_semana||0}/10</div>
      </div></div>
    </div>`;

    if(ag.sugerencias?.length){
      html+=`<div class="card"><div class="ch ch-amber"><span class="ch-title">Sugerencias para la semana siguiente</span></div><div class="cb">
        ${ag.sugerencias.map(s=>`<div class="sugerencia" style="margin-bottom:8px">${esc(s)}</div>`).join('')}
      </div></div>`;
    }
  }

  if(data.alertas?.length){
    html+=`<div class="divider"></div><div class="section-title" style="color:#F09595">Alertas</div>`;
    data.alertas.forEach(a=>{
      html+=`<div class="alerta">
        <div class="alerta-titulo">⚠ ${esc(a.titulo||'')}</div>
        <div class="alerta-desc">${esc(a.descripcion||'')}</div>
      </div>`;
    });
  }

  html+=`<div class="divider"></div>
  <button class="send-btn" onclick="enviarReporteMail()">Enviar resumen por mail</button>`;

  render(html);
}

async function enviarReporteMail(){
  const btn=document.querySelector('.send-btn');
  if(btn){btn.textContent='Enviando...';btn.disabled=true;}
  try{
    const reportes=await fetchReportes();
    const keys=Object.keys(reportes).sort().reverse();
    if(!keys.length){alert('No hay reporte generado.');return;}
    const r=reportes[keys[0]];
    const ag=r.analisis_general||{};

    let resumen=`ANÁLISIS SEMANAL DE PRODUCTIVIDAD - RATIO\nSemana: ${r.semana||''}\n\n`;
    resumen+=`RESUMEN EJECUTIVO\nBalance: ${ag.balance||''} | Puntaje: ${ag.score_semana||''}/10\n${ag.analisis_cuali||''}\n\n`;

    r.equipos?.forEach(eq=>{
      resumen+=`EQUIPO ${eq.nombre?.toUpperCase()}\n`;
      eq.integrantes?.forEach(p=>{resumen+=`- ${p.nombre}: ${p.score}/10 | ${p.balance}\n`;});
      resumen+=`MVP: ${eq.mvp?.nombre||''} - ${eq.mvp?.justificacion||''}\n`;
      resumen+=`Balance área: ${eq.balance_area||''}\n\n`;
    });

    if(r.alertas?.length){
      resumen+=`ALERTAS\n`;
      r.alertas.forEach(a=>{resumen+=`⚠ ${a.titulo}: ${a.descripcion}\n`;});
    }

    if(ag.sugerencias?.length){
      resumen+=`\nSUGERENCIAS\n${ag.sugerencias.map(s=>`• ${s}`).join('\n')}`;
    }

    await fetch('https://api.web3forms.com/submit',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        access_key:WEB3FORMS_KEY,
        subject:`Análisis semanal Ratio - ${r.semana||''}`,
        from_name:'Agente Ratio',
        message:resumen
      })
    });
    if(btn){btn.textContent='✓ Enviado';btn.style.background='#1a3a28';btn.style.color='#9FE1CB';}
  }catch(e){
    if(btn){btn.textContent='Error al enviar';btn.disabled=false;}
  }
}

async function showPanel(weekKey){
  setTopbar(`<button class="btn-ghost" onclick="logout()">Salir</button>`);
  render(`<div class="loading"><span class="spinner"></span><br><div class="loading-step">Cargando reporte...</div></div>`);

  const reportes=await fetchReportes();

  if(reportes[weekKey]){
    const prevWeekKey=getWeekKey(new Date(new Date(weekKey+'T12:00:00').getTime()-SEM_MS));
    const allWeeks=[weekKey];
    if(reportes[prevWeekKey])allWeeks.push(prevWeekKey);

    let weekSelector=`<div class="week-selector">`;
    allWeeks.forEach(w=>{
      weekSelector+=`<button class="week-btn ${w===weekKey?'active':''}" onclick="showPanel('${w}')">${weekLabel(w)}</button>`;
    });
    weekSelector+=`</div>`;

    const container=document.getElementById('view');
    container.innerHTML=weekSelector;
    const content=document.createElement('div');
    container.appendChild(content);
    content.id='analisis-content';
    document.getElementById('analisis-content').innerHTML='';

    const tempDiv=document.createElement('div');
    document.getElementById('view').appendChild(tempDiv);
    renderAnalisisInto(reportes[weekKey],weekKey,tempDiv);
    return;
  }

  render(`<div class="loading"><span class="spinner"></span><br><div class="loading-step">Generando análisis con IA...</div></div>`);

  try{
    const trackerData=await fetchTracker();
    const analisis=await generarAnalisis(trackerData,weekKey);
    if(analisis){
      await saveReporte(weekKey,analisis);
      renderAnalisis(analisis,weekKey);
    } else {
      render('<div style="text-align:center;padding:3rem;color:#7a8fa6">No hay suficientes datos para esta semana.</div>');
    }
  }catch(e){
    render(`<div style="text-align:center;padding:3rem;color:#F09595;font-size:13px">Error al generar el análisis: ${e.message}</div>`);
  }
}

function renderAnalisisInto(data,weekKey,container){
  const tmp=document.createElement('div');
  document.body.appendChild(tmp);
  tmp.id='_tmp_render';
  renderAnalisis(data,weekKey);
  const content=document.getElementById('view').innerHTML;
  document.body.removeChild(tmp);
  container.innerHTML='';
  renderAnalisis(data,weekKey);
}

function showLogin(){
  setTopbar('');
  render(`<div class="card card-red" style="max-width:380px;margin:0 auto">
    <div class="ch ch-red"><span class="ch-title">Acceso restringido</span></div>
    <div class="cb">
      <p style="font-size:13px;color:#7a8fa6;margin-bottom:14px">Ingresá la contraseña para acceder al panel de análisis.</p>
      <input class="inp-dark" type="password" id="inp-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
      <div style="margin-top:12px"><button class="save-btn" onclick="doLogin()">Entrar</button></div>
      <p class="err-msg" id="err-pass" style="display:none"></p>
    </div>
  </div>`);
}

function doLogin(){
  const p=document.getElementById('inp-pass').value;
  const err=document.getElementById('err-pass');
  if(p===AGENTE_PASS){
    localStorage.setItem('ratio_agente_auth','1');
    const weekKey=getWeekKey(new Date(Date.now()-SEM_MS));
    showPanel(weekKey);
  } else {
    err.textContent='Contraseña incorrecta.';err.style.display='block';
    document.getElementById('inp-pass').value='';
  }
}

function logout(){
  localStorage.removeItem('ratio_agente_auth');
  showLogin();
}

function init(){
  if(localStorage.getItem('ratio_agente_auth')==='1'){
    const weekKey=getWeekKey(new Date(Date.now()-SEM_MS));
    showPanel(weekKey);
  } else {
    showLogin();
  }
}

init();
</script>
